:root{

*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;padding:28px 28px 48px;max-width:1400px;margin:0 auto;-webkit-font-smoothing:antialiased;letter-spacing:-.01em;transition:background .25s,color .25s}
.hero{display:flex;align-items:flex-end;justify-content:space-between;flex-wrap:wrap;gap:16px;margin-bottom:24px}
.hero h1{font-size:30px;font-weight:720;letter-spacing:-.03em}
.hero .sub{color:var(--muted);font-size:13.5px;margin-top:6px;line-height:1.5;max-width:680px}
.hright{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.pill{display:inline-flex;align-items:center;gap:7px;background:var(--surface);border:1px solid var(--border);border-radius:999px;padding:7px 14px;font-size:12px;font-weight:600;color:var(--muted);box-shadow:var(--shadow-soft)}
.pill .dot{width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:0 0 0 3px rgba(22,163,74,.15)}
.btn{background:var(--surface);border:1px solid var(--border);border-radius:999px;padding:7px 14px;font-size:12px;font-weight:600;color:var(--muted);cursor:pointer;box-shadow:var(--shadow-soft);transition:all .15s}
.btn:hover{color:var(--text);border-color:var(--border-strong)}
.tabs{display:flex;gap:6px;margin-bottom:20px;flex-wrap:wrap;border-bottom:1px solid var(--border);padding-bottom:0}
.tab{background:none;border:none;padding:10px 16px;font-size:14px;font-weight:600;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .15s}
.tab:hover{color:var(--text)}
.tab.active{color:var(--blue);border-bottom-color:var(--blue)}
.tab-pane{display:none}.tab-pane.active{display:block;animation:fade .25s}
@keyframes fade{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
.grid{display:grid;gap:14px}
.kpis-primary{grid-template-columns:repeat(3,1fr);margin-bottom:14px}
.kpis-secondary{grid-template-columns:repeat(4,1fr);margin-bottom:22px}

.kpi:hover{transform:translateY(-2px);box-shadow:var(--shadow)}
.kpi.primary{background:radial-gradient(circle at top right,rgba(37,99,235,.08),transparent 42%),var(--surface)}
.kpi .l{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);font-weight:600}

.kpis-primary .kpi{padding:20px 22px}.kpis-primary .kpi .v{font-size:27px}
.tone-blue{color:var(--blue)}.tone-green{color:var(--green)}.tone-red{color:var(--red)}.tone-amber{color:var(--amber)}.tone-purple{color:var(--purple)}.tone-cyan{color:var(--cyan)}
.section-title{font-size:16px;font-weight:700;letter-spacing:-.02em;margin:4px 0 14px;color:var(--text)}
.row{display:grid;gap:16px;margin-bottom:16px}.row-2{grid-template-columns:1fr 1fr}.row-3{grid-template-columns:2fr 1fr}
@media(max-width:920px){.row-2,.row-3{grid-template-columns:1fr}}
.card{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:22px;box-shadow:var(--shadow-soft)}
.card h2{font-size:14.5px;font-weight:650;letter-spacing:-.01em;margin-bottom:16px;color:var(--text)}
.chart{position:relative;height:300px}
.note{font-size:12px;color:var(--muted);margin-top:10px;line-height:1.5}
.note b{color:var(--text)}
table{width:100%;border-collapse:collapse;font-size:12.5px}
th,td{text-align:right;padding:9px 10px;border-bottom:1px solid var(--border)}

tr.tot{font-weight:700;background:var(--surface-soft)}

.twrap{overflow:auto;max-height:560px;border-radius:14px;border:1px solid var(--border)}

.gtable thead{box-shadow:inset 0 -1px 0 var(--border)}

const fpct=n=>(n||0).toFixed(2).replace('.',',')+'%';

// ========== generic sortable+searchable+CSV table ==========
function csvDL(name,head,rows){
  const esc=v=>{v=(v==null?'':String(v)).replace(/"/g,'""');return/[",\n;]/.test(v)?'"'+v+'"':v;};
  const lines=[head.map(h=>h.label).join(';')];
  rows.forEach(r=>lines.push(head.map(h=>esc(h.fmt?h.fmt(r):r[h.k])).join(';')));
  const blob=new Blob(['\ufeff'+lines.join('\n')],{type:'text/csv;charset=utf-8'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=name;a.click();
}
function makeTable(cfg){
  const {id,head,rows,searchId,exportId,exportName,sort,limit}=cfg;
  let state={k:sort||head[0].k,dir:-1,q:''};
  const shown=()=>{let r=rows.filter(r=>!state.q||head.some(h=>String(h.fmt?h.fmt(r):r[h.k]).toLowerCase().includes(state.q.toLowerCase())));r.sort((a,b)=>{let va=hval(a,state.k),vb=hval(b,state.k);return(typeof va==='number'&&typeof vb==='number')?(va-vb)*state.dir:String(va).localeCompare(String(vb),'ru')*state.dir;});return r;};
  const hval=(r,k)=>{const h=head.find(h=>h.k===k);return h&&h.fmt?h.fmt(r):(r[k]??'');};
  const render=()=>{
    const tbody=document.querySelector(`#${id} tbody`);
    if(!tbody)return;
    let r=shown();const n=limit||r.length;
    tbody.innerHTML=r.slice(0,n).map(row=>`<tr>${head.map(h=>`<td class="${h.cls||''}">${h.render?h.render(row):(h.fmt?h.fmt(row):row[h.k])}</td>`).join('')}</tr>`).join('');
    document.querySelectorAll(`#${id} th[data-k]`).forEach(th=>{th.querySelector('.sort-arrow')?.remove();if(th.dataset.k===state.k)th.insertAdjacentHTML('beforeend',`<span class="sort-arrow">${state.dir>0?'▲':'▼'}</span>`);});
    const cnt=document.querySelector(`#${id} .tcount`);if(cnt)cnt.textContent=fmt(r.length)+' строк';
  };
  setTimeout(()=>{
    document.querySelectorAll(`#${id} th[data-k]`).forEach(th=>th.addEventListener('click',()=>{state.k=th.dataset.k;state.dir*=-1;render();}));
    if(searchId){const s=document.getElementById(searchId);if(s)s.addEventListener('input',e=>{state.q=e.target.value;render();});}
    if(exportId){const b=document.getElementById(exportId);if(b)b.addEventListener('click',()=>csvDL(exportName,head,shown()));}
    render();
  },0);
}

function renderMargin(){
  const el=document.getElementById('pane-margin');const m=A.margin;const d=m.dist;
  el.innerHTML=`<div class="grid kpis-secondary" style="margin-bottom:16px">
    <div class="kpi"><div class="l">Прибыль (факт)</div><div class="v tone-green">${fmt(m.actual_profit)} ₽</div></div>
    <div class="kpi"><div class="l">Рентабельность</div><div class="v tone-blue">${fpct(m.actual_pct)}</div></div>
    <div class="kpi"><div class="l">Закупка (база)</div><div class="v">${fmt(m.purchase)} ₽</div></div>
    <div class="kpi"><div class="l">Деталей в выборке</div><div class="v">${fmt(m.n_deals)}</div></div>
  </div>
  <div class="card" style="margin-bottom:16px"><h2>Распределение маржи (топ-2000, выборка)</h2><div class="chart"><canvas id="mrgDist"></canvas></div><div class="note">${m.note}</div></div>
  <div class="card"><h2>Симулятор прибыли</h2>
    <div class="sim"><div class="sim-row"><span style="font-weight:600;font-size:13px">Целевая рентабельность:</span><input type="range" id="mrgSlider" min="1" max="5" step="0.1" value="1.5"><span class="sim-val" id="mrgVal">1,5%</span></div>
      <div class="sim-grid"><div class="sim-cell"><div class="l">Целевая прибыль</div><div class="v tone-blue" id="simTarget">—</div></div>
        <div class="sim-cell"><div class="l">Прирост к факту</div><div class="v tone-green" id="simUplift">—</div></div>
        <div class="sim-cell"><div class="l">Прирост, %</div><div class="v tone-amber" id="simUpliftPct">—</div></div></div>
      <div class="chart" style="height:240px"><canvas id="simChart"></canvas></div>
      <div class="note">Фактическая рентабельность ${fpct(m.actual_pct)}. Прибыль = закупка × целевая рентабельность / 100. Симулятор показывает потенциал роста прибыли.</div>
    </div></div>`;
  const colors=[C.red,C.amber,C.amber,C.green,C.green,C.green,C.red];
  mk(document.getElementById('mrgDist'),{type:'bar',data:{labels:d.map(x=>x.label),datasets:[{label:'Сделок',data:d.map(x=>x.deals),backgroundColor:colors}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:baseScales()}});
  let simChart=null;
  function simRender(t){
    const target=m.purchase*t/100;const uplift=target-m.actual_profit;const upliftPct=m.actual_profit?uplift/m.actual_profit*100:0;
    document.getElementById('mrgVal').textContent=t.toFixed(1).replace('.',',')+'%';
    document.getElementById('simTarget').textContent=fmt(target)+' ₽';
    document.getElementById('simUplift').textContent=(uplift>=0?'+':'')+fmt(uplift)+' ₽';
    document.getElementById('simUpliftPct').textContent=(upliftPct>=0?'+':'')+upliftPct.toFixed(1).replace('.',',')+'%';
    if(simChart)simChart.destroy();
    simChart=mk(document.getElementById('simChart'),{type:'bar',data:{labels:['Факт','Цель'],datasets:[{data:[m.actual_profit,target],backgroundColor:[C.slate,C.blue],borderRadius:8}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:baseScales()}});
  }
  document.getElementById('mrgSlider').addEventListener('input',e=>simRender(parseFloat(e.target.value)));
  simRender(1.5);
}

let rendered={};
function showTab(id){
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',t.dataset.tab===id));
  document.querySelectorAll('.tab-pane').forEach(p=>p.classList.toggle('active',p.id==='pane-'+id));
  if(!rendered[id]){renderers[id]();rendered[id]=true;}
  setTimeout(()=>charts.forEach(c=>c.resize()),60);
}
